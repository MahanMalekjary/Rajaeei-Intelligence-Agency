<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IO People</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="topbar">
        <div class="topbar-search">
            <input type="text" id="search-input" class="input-field" placeholder="Search people...">
        </div>
        <div class="stats-bar">
            <span>Total: <strong id="stat-total">0</strong></span>
            <span>Countries: <strong id="stat-countries">0</strong></span>
        </div>
        <select id="sort-select" class="input-field" style="width: auto;">
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
            <option value="alpha">A-Z</option>
        </select>
        <div class="topbar-actions">
            <span id="user-name" style="font-size: 14px; font-weight: 600;"></span>
            <button id="logout-btn" class="btn-icon" title="Logout">⏻</button>
        </div>
    </div>

    <div class="dashboard-content">
        <div id="people-grid"></div>
    </div>

    <button id="add-btn" class="fab">+</button>

    <div id="modal-overlay">
        <div id="modal-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 id="modal-title">Add Person</h2>
                <button id="modal-close" class="btn-icon">&times;</button>
            </div>
            <input type="file" id="file-input" multiple accept="image/*" style="display: none;">
            <div id="image-drop-zone">Drag & Drop Images Here or Click to Browse</div>
            <form id="person-form"></form>
            <button type="submit" form="person-form" id="modal-submit" class="btn" style="width: 100%; margin-top: 10px;">Save Person</button>
        </div>
    </div>

    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
