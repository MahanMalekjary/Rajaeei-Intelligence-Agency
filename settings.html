<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IO Settings</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="topbar">
        <a href="index.html" class="btn" style="text-decoration: none; padding: 8px 16px;">← Back</a>
        <div style="margin-left: auto; display: flex; align-items: center; gap: 15px;">
            <span id="settings-user" style="font-size: 14px;"></span>
            <button id="settings-logout" class="btn-icon" title="Logout">⏻</button>
        </div>
    </div>

    <div class="settings-container glass fade-in">
        <h2 style="margin-bottom: 30px;">Settings</h2>
        
        <div class="setting-group">
            <label>Card Grid Size (px)</label>
            <input type="range" id="grid-size" min="200" max="500" value="300" class="input-field" style="padding: 0;">
        </div>

        <div class="setting-group">
            <label>Backup & Restore</label>
            <div style="display: flex; gap: 10px;">
                <button id="export-all" class="btn">Export All Data (JSON)</button>
                <button id="import-all" class="btn" style="background: var(--bg-tertiary);">Import Data</button>
                <input type="file" id="import-file" accept=".json" style="display: none;">
            </div>
        </div>
    </div>

    <script type="module" src="js/settings.js"></script>
</body>
</html>
